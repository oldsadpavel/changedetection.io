services:
    changedetection:
      image: ghcr.io/dgtlmoon/changedetection.io
      container_name: changedetection
      hostname: changedetection
      volumes:
        - changedetection-data:/datastore
      # SSO для UI changedetection (Coolify): см. docs/monitoring-sso.md в
      # репо new_tetrapak. Labels Coolify-application'а через compose НЕ
      # подхватываются — он перетирает их своими (routers.https-0-<id>).
      # Поэтому SSO-labels добавлены НЕ здесь, а в Coolify UI:
      # platform → changedetection → Advanced → Container Labels.
      environment:
        # Включает скриншоты + рендер JS-страниц через headless-Chrome
        # (сервис browser-sockpuppet-chrome ниже).
        - PLAYWRIGHT_DRIVER_URL=ws://browser-sockpuppet-chrome:3000
      depends_on:
        browser-sockpuppet-chrome:
          condition: service_started
      ports:
        - 127.0.0.1:5000:5000
      restart: unless-stopped

    # Sockpuppetbrowser = chrome, обёрнутый в API для быстрого фетча страниц.
    # Нужен changedetection'у для скриншотов и рендера JS (PLAYWRIGHT_DRIVER_URL).
    browser-sockpuppet-chrome:
        hostname: browser-sockpuppet-chrome
        image: dgtlmoon/sockpuppetbrowser:latest
        cap_add:
            - SYS_ADMIN
        restart: unless-stopped
        environment:
            - SCREEN_WIDTH=1920
            - SCREEN_HEIGHT=1024
            - SCREEN_DEPTH=16
            - MAX_CONCURRENT_CHROME_PROCESSES=10

volumes:
  changedetection-data:
